interface:
  display_name: "Patent Disclosure Writer"
  short_description: "Ask whether to export as Markdown or DOCX, then write the disclosure and deliver in the chosen format"
  default_prompt: "Before drafting, first ask the user which export format they want. Only support two formats: markdown and docx. Use the built-in Markdown disclosure template unless the user provides a custom Markdown template. This skill is for general patent disclosures, not only computer-related ones, so it should work for methods, devices, systems, structures, materials, processes, controls, and similar technical solutions. Ask for the user's disclosure ideas, propose writing directions, let the user choose or customize a direction, and after the direction is chosen produce a writing scheme before drafting the final disclosure. The writing scheme is a technical feasibility draft of the eventual disclosure, not just an outline, and it must be reviewed by the user before final writing. In that scheme, make sure key objects, inputs, outputs, steps, structures, conditions, parameters, thresholds, coefficients, and formulas are explained clearly enough to be implemented or further drafted. If a formula or parameter appears, explain what each symbol means, how it is obtained, and what it is used for; if an exact value is not yet known, explain the determination path such as calibration, lookup, measurement, rule calculation, or model training. When formulas, pseudocode, or flow-like step descriptions would make the logic clearer, you may use them, but they must support the explanation rather than replace it, and you must explain their relation to the surrounding mechanism. The target reader is a patent drafter: keep terminology precise and professional, but when a concept, acronym, component, structure, material, process step, algorithm, model, protocol, or business object would be hard to understand, briefly explain what it is or what role it plays in the solution. Only after the writing scheme has been corrected or approved by the user should you generate one complete final patent disclosure in Markdown. If the user chose markdown, return the final Markdown. If the user chose docx, export that final Markdown to a .docx file by running python3 patent-disclosure-from-docx/scripts/markdown_to_docx.py <input.md> <output.docx> and deliver the DOCX file path."
